# =============================================================================
# RS2 Team 8 — Waypoint Configuration File
# =============================================================================
#
# FORMAT:
#   Each map is a [section] header followed by waypoint definitions:
#       name = x, y, yaw_degrees
#
#   x, y     : position in metres in the map frame
#   yaw_deg  : robot heading on arrival (ROS convention)
#              0 = East (+X), 90 = North (+Y), 180 = West, -90 = South (-Y)
#
# ACTIVE MAP:
#   Set [active] -> map to the section name you want to load at runtime.
#   Only that section's waypoints (and its initial_pose block) are loaded.
#   The navigation_node will log which map it loaded so you can verify.
#
# ADDING A NEW MAP:
#   1. Drive the real robot and record coordinates (ros2 topic echo /amcl_pose).
#   2. Add a new [map_name] block with your waypoints.
#   3. Add a matching [map_name_initial_pose] block.
#   4. Change [active] -> map = map_name.
#   5. Rebuild is NOT required — the file is read at node startup.
#
# FIRE EXIT WAYPOINTS:
#   Any waypoint whose name starts with "fire_exit" is automatically included
#   in the nearest-fire-exit calculation. No extra registration needed.
#
# =============================================================================

[active]
# Change this to switch maps without editing navigation.py
map = simulation


# =============================================================================
# SIMULATION MAP  (Gazebo turtlebot3_world)
# Positions measured with 0.5 m radius cylinder markers in world frame,
# then converted: map_x = world_x + 2.0, map_y = world_y + 0.5
# =============================================================================
[simulation]
home        =  0.000,  0.000,    0.0
artifact_1  =  1.029,  2.240, -135.0
artifact_2  =  2.963,  2.253,  135.0
artifact_3  =  2.950, -1.261,   45.0
artifact_4  =  1.030, -1.237,  -45.0
toilets     =  3.819,  0.485,   90.0
fire_exit_1 =  1.994,  2.502,  180.0
fire_exit_2 =  1.987, -1.528,    0.0

[simulation_initial_pose]
x   = 0.0
y   = 0.0
yaw = 0.0


